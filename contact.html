<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact</title>
  <link href="./src/output.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
  <!-- Section header contact -->
<section class="relative min-h-screen text-white">
  <img src="./assets/Imag/headerContact.png" alt="This is Image"
       class="absolute inset-0 w-full h-full object-cover" />
  <div class="absolute inset-0 bg-black/40"></div>
  <div class="relative z-10">
    <header class="container mx-auto px-4 sm:px-6 my-6 md:my-10 flex justify-between items-center">

      <div class="flex items-center gap-4 md:gap-8">
        <img src="./assets/Imag/Logo.svg" alt="This is Image"
             class="w-[120px] sm:w-[150px] md:w-[207px]" />
        <div class="md:hidden">
          <i class="fa-solid fa-bars text-xl cursor-pointer"></i>
        </div>
      </div>
      <div class="flex items-center gap-3 sm:gap-6 md:gap-10">
        <a href="#" class="text-sm md:text-xl">
          +86 852 346 000
        </a>

        <button class="border border-white px-4 py-2 hover:bg-white hover:text-black transition">
          Reservations
        </button>
      </div>

    </header>
    <div class="container mx-auto px-6 mt-20 grid md:grid-cols-2 gap-10 items-center">
      <div>
        <h2 class="text-5xl md:text-6xl font-title mb-6">
          Get in Touch
        </h2>
        <p class="text-sm text-gray-200">
          The freshest ingredients for you every day
        </p>
      </div>
      <div class="text-sm text-gray-200 space-y-4">
        <div class="flex justify-between items-center">
          <h3 class="text-white font-semibold">Open Time</h3>
          <p>Sunday - Friday</p>
        </div>
        <div class="border-t border-dashed border-gray-400"></div>
        <div class="grid grid-cols-3 gap-4 text-center md:text-right">

          <div>
            <p class="text-white">Brunch</p>
            <p>11:00–12:00</p>
          </div>

          <div>
            <p class="text-white">Lunch</p>
            <p>13:00–17:00</p>
          </div>

          <div>
            <p class="text-white">Dinner</p>
            <p>18:00–20:00</p>
          </div>

        </div>

      </div>

    </div>

  </div>

</section>
</body>
</html>
