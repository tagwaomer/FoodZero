<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home</title>
  <link href="./src/output.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class=" bg-background text-foreground font-Rufina">
  <!-- Header -->
<header class="container mx-auto px-6 my-10 flex flex-wrap justify-between items-center">

  <!-- left side -->
  <div class="flex items-center gap-6">
    <img src="./assets/Imag/Logo.svg"
         alt="Logo"
         class="w-[150px] sm:w-[180px] md:w-[207px] h-auto" />
         <i class="fa-solid fa-bars text-2xl md:hidden cursor-pointer"></i>
  </div>

  <!-- right side -->
  <div class="flex items-center gap-4 sm:gap-6">
    <span class="font-Inter text-sm sm:text-base md:text-xl cursor-pointer">+86 852 346 000</span>

    <button class="font-Rufina text-sm sm:text-lg md:text-xl lg:text-2xl border border-white px-4 sm:px-6 py-2 sm:py-3 hover:bg-foreground hover:text-card-foreground transition duration-300 cursor-pointer">
      Reservations
    </button>
  </div>
</header>
<!--hero section  -->
<section class="relative h-screen flex items-center overflow-hidden">
  <div class="container mx-auto grid lg:grid-cols-2 items-center">
    
    <!-- LEFT SIDE -->
    <div class="max-w-xl h-full flex flex-col justify-center">
<h1 class=" font-Rufina text-[40px] sm:text-[48px] md:text-[56px] lg:text-[64px] leading-[1.1] tracking-[-1px] mb-6"> Healthy Eating<br> is important<br> part of <br> lifestyle </h1>
      <p class="text-muted-foreground font-Lato text-sm max-w-md">
        Lorem ipsum dolor sit amet, consectetur adipiscing<br/>
        elit. Neque congue arcu
      </p>
    </div>

    <!-- RIGHT SIDE -->
    <div class="relative w-full max-w-[520px] mx-auto lg:mx-0">
      <img 
        src="./assets/Imag/Image.png"
        alt="This is image"
        class="w-full h-[440px] md:h-[480px] lg:h-[500px] object-cover"
      />
      <img 
        src="./assets/Imag/Images.png"
        alt="This is image"
        class="absolute bottom-[-30px] left-[-130px] w-[180px] sm:w-[220px] md:w-[350px]"
      />
    </div>

  </div>

  <div class="hidden lg:flex absolute py-48 px-28 translate-y-1/2">
    <img 
      src="./assets/Imag/Header_Scroll_Default.svg"
      class="w-6"
      alt="This is image"
    />
  </div>
</section>
</body>
</html>
